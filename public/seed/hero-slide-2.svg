  <rect x="180" y="540" width="180" height="58" rx="29" fill="#4f46e5"/>
  <rect x="382" y="540" width="180" height="58" rx="29" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-opacity="0.5"/>
