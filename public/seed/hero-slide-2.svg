<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title>Hero Slide Two</title>
  <desc>Creative and responsive hero slide</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="1040" y="120" width="320" height="520" rx="36" fill="#ffffff" fill-opacity="0.08"/>
  <rect x="1100" y="180" width="200" height="18" rx="9" fill="#fdf2f8" fill-opacity="0.9"/>
  <rect x="1100" y="230" width="200" height="120" rx="24" fill="#ffffff" fill-opacity="0.18"/>
